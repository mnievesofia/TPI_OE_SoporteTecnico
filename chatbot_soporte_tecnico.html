<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bot de Soporte Técnico – TechSoluciones S.A.</title>
<!--
  =============================================================
  TPI - Organización Empresarial | UTN TUPaD
  Alumna: Sofia M. Nieves
  Proyecto: Chatbot de Soporte Técnico Nivel 1
  Organización ficticia: TechSoluciones S.A.
  Plataforma: Web (HTML5 + CSS3 + JavaScript Vanilla)
  =============================================================
  ESTRUCTURA DEL ARCHIVO:
    1. Estilos CSS (interfaz del chat)
    2. HTML (estructura de la interfaz)
    3. JavaScript:
       a. Base de datos simulada (DB_EMPLEADOS, DB_SOLUCIONES)
       b. Máquina de estados (ESTADOS)
       c. Funciones de UI (render de mensajes, botones)
       d. Lógica del bot (handleUserInput + switch/case por estado)
       e. Inicialización
  =============================================================
-->
<style>
  /* Reset y fuente base */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e2a3a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Contenedor principal del chat */
  .app-wrapper { width: 100%; max-width: 480px; }

  /* Encabezado con nombre del bot y estado */
  .app-header {
    background: #1565c0;
    border-radius: 16px 16px 0 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bot-avatar {
    width: 42px; height: 42px;
    background: #ffffff22;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .app-header h1 { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.3; }
  .app-header p  { color: #90caf9; font-size: 12px; }
  .status-dot { width: 8px; height: 8px; background: #69f0ae; border-radius: 50%; margin-right: 4px; display: inline-block; }

  /* Ventana de mensajes del chat */
  .chat-window {
    background: #f5f7fa;
    height: 420px;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  /* Burbuja de mensaje genérica */
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.5;
    word-break: break-word;
  }

  /* Mensaje del bot (izquierda) */
  .msg.bot {
    background: #fff;
    color: #1a2332;
    border-radius: 4px 16px 16px 16px;
    align-self: flex-start;
    box-shadow: 0 1px 4px #0001;
  }

  /* Mensaje del usuario (derecha) */
  .msg.user {
    background: #1565c0;
    color: #fff;
    border-radius: 16px 4px 16px 16px;
    align-self: flex-end;
  }

  /* Mensaje de error / camino infeliz */
  .msg.error {
    background: #fdecea;
    color: #c62828;
    border-left: 3px solid #ef5350;
    border-radius: 4px 12px 12px 4px;
    align-self: flex-start;
  }

  /* Mensaje informativo (solución encontrada) */
  .msg.info {
    background: #e3f2fd;
    color: #0d47a1;
    border-left: 3px solid #1565c0;
    border-radius: 4px 12px 12px 4px;
    align-self: flex-start;
  }

  /* Mensaje de éxito (ticket resuelto) */
  .msg.success {
    background: #e8f5e9;
    color: #1b5e20;
    border-left: 3px solid #43a047;
    border-radius: 4px 12px 12px 4px;
    align-self: flex-start;
  }

  .msg b { font-weight: 600; }

  /* Fila de botones de opciones rápidas */
  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px;
    background: #f5f7fa;
  }

  /* Botón de opción rápida */
  .opt-btn {
    background: #fff;
    border: 1.5px solid #1565c0;
    color: #1565c0;
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .opt-btn:hover { background: #1565c0; color: #fff; }
  .opt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Barra de entrada de texto */
  .input-row {
    background: #fff;
    border-radius: 0 0 16px 16px;
    border-top: 1px solid #e0e0e0;
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #user-input {
    flex: 1;
    border: 1.5px solid #ddd;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    transition: border 0.15s;
  }
  #user-input:focus { border-color: #1565c0; }

  /* Botón de enviar */
  #send-btn {
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #0d47a1; }

  /* Tarjeta de ticket generado */
  .ticket-card {
    background: #fff;
    border: 1px solid #c8e6c9;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12.5px;
    color: #2e7d32;
    margin-top: 4px;
  }
  .ticket-card .tk-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .ticket-card .tk-label { color: #555; font-weight: 600; }
  .ticket-card .tk-val   { color: #1b5e20; }

  /* Indicador de "escribiendo..." */
  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
    background: #fff;
    border-radius: 4px 16px 16px 16px;
    align-self: flex-start;
    width: 58px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: #aaa;
    border-radius: 50%;
    animation: bounce 1.1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* Badge que indica consulta a la base de datos */
  .db-badge {
    font-size: 11px;
    background: #ede7f6;
    color: #512da8;
    border-radius: 10px;
    padding: 2px 8px;
    display: inline-block;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- ============================================================
     ESTRUCTURA HTML DEL CHAT
     ============================================================ -->
<div class="app-wrapper">

  <!-- Encabezado del bot -->
  <div class="app-header">
    <div class="bot-avatar">🤖</div>
    <div>
      <h1>TechBot – Soporte Técnico</h1>
      <p><span class="status-dot"></span>TechSoluciones S.A. · Nivel 1</p>
    </div>
  </div>

  <!-- Ventana donde se muestran los mensajes -->
  <div class="chat-window" id="chat"></div>

  <!-- Fila de botones de opciones rápidas (se genera dinámicamente) -->
  <div class="options-row" id="options-row"></div>

  <!-- Entrada de texto libre + botón enviar -->
  <div class="input-row">
    <input type="text" id="user-input" placeholder="Escribí tu respuesta..." autocomplete="off"/>
    <button id="send-btn" title="Enviar">➤</button>
  </div>

</div>

<script>
// ================================================================
// BASE DE DATOS SIMULADA
// Simula las tablas que en un sistema real estarían en MySQL/PostgreSQL.
// Refleja la estructura definida en el Diccionario de Datos del informe.
// ================================================================

/**
 * DB_EMPLEADOS
 * Tabla de empleados de TechSoluciones S.A.
 * Clave primaria: legajo (string de 4 dígitos)
 * Campos: nombre (string), area (string)
 */
const DB_EMPLEADOS = {
  "1001": { nombre: "Ana García",      area: "Administración" },
  "1002": { nombre: "Carlos López",    area: "Ventas"         },
  "1003": { nombre: "María Torres",    area: "Sistemas"       },
  "1004": { nombre: "Pedro Díaz",      area: "Contabilidad"   },
  "1005": { nombre: "Laura Fernández", area: "RRHH"           }
};

/**
 * DB_SOLUCIONES
 * Tabla de problemas y soluciones por categoría.
 * Clave primaria: categoria (hardware | software | red)
 * Cada categoría tiene un array de objetos { problema, solucion }
 * Equivale a la plantilla Excel adjunta en el repositorio.
 */
const DB_SOLUCIONES = {
  hardware: [
    { problema: "PC no enciende",
      solucion: "Verificá que el cable de alimentación esté bien conectado. Probá con otro tomacorriente. Si tiene UPS, revisá que esté encendida." },
    { problema: "Impresora no imprime",
      solucion: "Revisá que la impresora esté encendida y con papel. Verificá la cola de impresión en Panel de Control → Dispositivos e Impresoras." },
    { problema: "Monitor sin imagen",
      solucion: "Comprobá el cable VGA/HDMI en ambos extremos. Probá presionar Win+P para cambiar la salida de video." },
    { problema: "Teclado/mouse no responde",
      solucion: "Desconectá y reconectá el dispositivo. Si es USB, probá otro puerto. Si es inalámbrico, cambiá las pilas." }
  ],
  software: [
    { problema: "No puedo acceder al sistema ERP",
      solucion: "Cerrá y volvé a abrir el navegador. Limpiá caché con Ctrl+Shift+Del. Si persiste, contactá a soporte para restablecer sesión." },
    { problema: "Error al iniciar Windows",
      solucion: "Reiniciá el equipo. Si el error persiste, intentá modo seguro (F8 al inicio) y ejecutá sfc /scannow en CMD." },
    { problema: "Programa no abre / se congela",
      solucion: "Abrí el Administrador de tareas (Ctrl+Alt+Del), finalizá la tarea y volvé a abrirlo. Si falla, reiniciá el equipo." },
    { problema: "Olvidé mi contraseña de red",
      solucion: "Ingresá a la intranet con tu usuario y usá la opción 'Olvidé mi contraseña'. Si no podés acceder, te asistimos desde aquí." }
  ],
  red: [
    { problema: "Sin conexión a internet",
      solucion: "Revisá el cable de red o la señal WiFi. Reiniciá el router apagándolo 30 segundos. Probá ejecutar: ipconfig /release y ipconfig /renew en CMD." },
    { problema: "No puedo acceder a carpetas compartidas",
      solucion: "Verificá que estés conectado a la red corporativa. Comprobá el mapeo de unidades en el Explorador de Windows." },
    { problema: "VPN no conecta",
      solucion: "Asegurate de tener internet activo primero. Reiniciá el cliente VPN. Si el error persiste, revisá tus credenciales con RRHH." },
    { problema: "Lentitud de red",
      solucion: "Cerrá aplicaciones que consumen banda (streaming, descargas). Si el problema afecta a toda la oficina, avisamos al proveedor." }
  ]
};

// ================================================================
// MÁQUINA DE ESTADOS
// Define todos los estados posibles del chatbot.
// El bot solo puede estar en un estado a la vez.
// Cada estado determina qué entrada espera y a dónde transiciona.
//
// Diagrama de transiciones:
// INICIO → ESPERA_LEGAJO → ESPERA_CATEGORIA → ESPERA_PROBLEMA
//        → ESPERA_RESOLUCION → FINALIZADO
//                           → ESCALADO
// (ESPERA_LEGAJO también puede ir a FINALIZADO si hay 3 fallos)
// ================================================================
const ESTADOS = {
  INICIO:            "INICIO",           // Estado inicial al cargar
  ESPERA_LEGAJO:     "ESPERA_LEGAJO",    // Esperando número de legajo
  ESPERA_CATEGORIA:  "ESPERA_CATEGORIA", // Esperando categoría del problema
  ESPERA_PROBLEMA:   "ESPERA_PROBLEMA",  // Esperando problema específico
  ESPERA_RESOLUCION: "ESPERA_RESOLUCION",// Esperando confirmación de resolución
  ESCALADO:          "ESCALADO",         // Ticket escalado a técnico N2
  FINALIZADO:        "FINALIZADO"        // Ticket cerrado como resuelto
};

/**
 * Objeto de sesión: almacena el estado actual y los datos
 * recopilados durante la conversación (equivale a la "memoria" del bot).
 */
let estado = ESTADOS.INICIO;
let sesion = {
  legajo:          null, // Legajo validado del empleado
  empleado:        null, // Objeto { nombre, area } del empleado
  categoria:       null, // Categoría seleccionada (hardware/software/red)
  problema:        null, // Problema específico seleccionado
  solucion:        null, // Solución presentada al usuario
  ticketId:        null, // ID único del ticket generado
  intentosLegajo:  0     // Contador de intentos fallidos de legajo
};

// ================================================================
// FUNCIONES DE INTERFAZ (UI)
// Manejan el renderizado de mensajes, botones y animaciones.
// ================================================================

// Referencias a elementos del DOM
const chat       = document.getElementById("chat");
const optionsRow = document.getElementById("options-row");
const input      = document.getElementById("user-input");

/** Hace scroll automático al final del chat */
function scrollDown() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

/**
 * Agrega un mensaje al chat.
 * @param {string} texto  - Contenido del mensaje
 * @param {string} tipo   - Clase CSS: "bot" | "user" | "error" | "info" | "success"
 * @param {boolean} html  - Si es true, interpreta el texto como HTML
 */
function addMsg(texto, tipo = "bot", html = false) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  if (html) div.innerHTML = texto;
  else       div.textContent = texto;
  chat.appendChild(div);
  scrollDown();
  return div;
}

/**
 * Genera y muestra la tarjeta visual del ticket registrado.
 * En un sistema real, este ticket se persistiría en la base de datos.
 * @param {object} ticket - Datos del ticket { id, empleado, area, categoria, problema, estado }
 */
function addTicketCard(ticket) {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<b>✅ Ticket registrado</b><br/>
    <div class="ticket-card">
      <div class="tk-row"><span class="tk-label">N° Ticket:</span><span class="tk-val">${ticket.id}</span></div>
      <div class="tk-row"><span class="tk-label">Empleado:</span><span class="tk-val">${ticket.empleado}</span></div>
      <div class="tk-row"><span class="tk-label">Área:</span><span class="tk-val">${ticket.area}</span></div>
      <div class="tk-row"><span class="tk-label">Categoría:</span><span class="tk-val">${ticket.categoria}</span></div>
      <div class="tk-row"><span class="tk-label">Problema:</span><span class="tk-val">${ticket.problema}</span></div>
      <div class="tk-row"><span class="tk-label">Estado:</span><span class="tk-val">${ticket.estado}</span></div>
      <span class="db-badge">📁 Guardado en base de datos</span>
    </div>`;
  chat.appendChild(div);
  scrollDown();
}

/** Muestra el indicador animado de "escribiendo..." */
function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing-indicator";
  div.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(div);
  scrollDown();
  return div;
}

/** Elimina el indicador de "escribiendo..." */
function removeTyping() {
  const t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

/**
 * Genera botones de opción rápida en la fila de opciones.
 * @param {string[]} opciones - Array de etiquetas para los botones
 */
function setOptions(opciones) {
  optionsRow.innerHTML = "";
  opciones.forEach(op => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = op;
    btn.onclick = () => handleUserInput(op); // Al hacer clic, se procesa como entrada del usuario
    optionsRow.appendChild(btn);
  });
}

/** Limpia los botones de opciones */
function clearOptions() { optionsRow.innerHTML = ""; }

/**
 * Simula la respuesta del bot con un pequeño delay (efecto natural).
 * @param {Array}    msgs    - Array de mensajes o acciones a renderizar
 * @param {string[]} opciones - Opciones a mostrar después de los mensajes
 * @param {number}   delay   - Delay en ms antes de mostrar los mensajes
 */
function botResponde(msgs, opciones = [], delay = 700) {
  showTyping();
  setTimeout(() => {
    removeTyping();
    msgs.forEach((m, i) => {
      setTimeout(() => {
        if (typeof m === "object") {
          if (m.tipo === "ticket") addTicketCard(m.data);
          else                     addMsg(m.texto, m.tipo, m.html || false);
        } else {
          addMsg(m); // Mensaje de texto simple
        }
        if (i === msgs.length - 1 && opciones.length > 0) {
          setOptions(opciones); // Muestra botones al final
        }
      }, i * 350);
    });
  }, delay);
}

// ================================================================
// LÓGICA DEL BOT (NÚCLEO)
// Implementa la máquina de estados mediante switch/case.
// Cada case corresponde a un estado del diagrama BPMN.
// ================================================================

/**
 * Genera un ID único para cada ticket.
 * Formato: TK-XXXXXX (últimos 6 dígitos del timestamp)
 */
function generarTicketId() {
  return "TK-" + Date.now().toString().slice(-6);
}

/**
 * Valida que el legajo ingresado sea exactamente 4 dígitos numéricos.
 * Corresponde a la tarea "Valida legajo" del diagrama BPMN (carril Sistema/Bot).
 * @param {string} val - Valor ingresado por el usuario
 * @returns {boolean}
 */
function validarLegajo(val) {
  return /^\d{4}$/.test(val.trim());
}

/**
 * Busca un empleado en DB_EMPLEADOS por su legajo.
 * Simula una consulta SELECT a la base de datos.
 * @param {string} legajo
 * @returns {object|null} - Objeto empleado o null si no existe
 */
function buscarEmpleado(legajo) {
  return DB_EMPLEADOS[legajo.trim()] || null;
}

/**
 * Función principal de la máquina de estados.
 * Procesa cada entrada del usuario según el estado actual.
 * Implementa tanto el "camino feliz" como el "camino infeliz" (unhappy path).
 * @param {string} valor - Texto ingresado por el usuario o botón presionado
 */
function handleUserInput(valor) {
  const val = valor.trim();
  if (!val) return; // Ignora entradas vacías

  clearOptions();              // Limpia botones anteriores
  addMsg(val, "user");         // Muestra el mensaje del usuario
  input.value = "";            // Limpia el campo de texto

  // ── Máquina de estados: un case por cada estado ──────────────────────────
  switch (estado) {

    // ── ESTADO: ESPERA_LEGAJO ──────────────────────────────────────────────
    // El bot espera que el usuario ingrese su número de legajo de 4 dígitos.
    // Gateway BPMN: ¿Legajo válido? → Sí: avanza / No: reintento (máx. 3)
    case ESTADOS.ESPERA_LEGAJO: {
      // Camino infeliz: formato incorrecto (no es número de 4 dígitos)
      if (!validarLegajo(val)) {
        sesion.intentosLegajo++;
        if (sesion.intentosLegajo >= 3) {
          // 3 intentos fallidos: deriva a RRHH y cierra el proceso
          botResponde([{ texto: "⚠️ Ingresaste un legajo inválido 3 veces. Por favor comunicarte con Recursos Humanos para verificar tu legajo.", tipo: "error" }]);
          estado = ESTADOS.FINALIZADO;
        } else {
          botResponde([{ texto: `⚠️ El legajo debe ser un número de 4 dígitos. Intentá de nuevo (intento ${sesion.intentosLegajo}/3).`, tipo: "error" }]);
        }
        return;
      }

      // Camino infeliz: formato correcto pero legajo no registrado en la BD
      const emp = buscarEmpleado(val);
      if (!emp) {
        sesion.intentosLegajo++;
        if (sesion.intentosLegajo >= 3) {
          botResponde([{ texto: "⚠️ No encontré tu legajo en el sistema tras 3 intentos. Por favor comunicarte con Recursos Humanos.", tipo: "error" }]);
          estado = ESTADOS.FINALIZADO;
        } else {
          botResponde([{ texto: `❌ Legajo ${val} no encontrado. Verificá el número e intentá de nuevo (intento ${sesion.intentosLegajo}/3).`, tipo: "error" }]);
        }
        return;
      }

      // Camino feliz: legajo válido y registrado
      sesion.legajo   = val;
      sesion.empleado = emp;
      sesion.intentosLegajo = 0;
      estado = ESTADOS.ESPERA_CATEGORIA; // Transición al siguiente estado
      botResponde(
        [`✅ Identidad verificada. ¡Hola, ${emp.nombre} (${emp.area})!`, "¿Cuál es la categoría de tu problema?"],
        ["💻 Hardware", "🖥️ Software", "🌐 Red / Conectividad"]
      );
      break;
    }

    // ── ESTADO: ESPERA_CATEGORIA ───────────────────────────────────────────
    // Gateway BPMN: ¿Tipo de problema? (HW / SW / Red)
    // Solo acepta una de las 3 opciones predefinidas.
    case ESTADOS.ESPERA_CATEGORIA: {
      let cat = null;
      if (val.includes("Hardware"))                       cat = "hardware";
      else if (val.includes("Software"))                  cat = "software";
      else if (val.includes("Red") || val.includes("Conectividad")) cat = "red";

      // Camino infeliz: entrada fuera de las opciones válidas
      if (!cat) {
        botResponde(
          [{ texto: "⚠️ Por favor seleccioná una de las opciones: Hardware, Software o Red.", tipo: "error" }],
          ["💻 Hardware", "🖥️ Software", "🌐 Red / Conectividad"]
        );
        return;
      }

      // Camino feliz: categoría válida, consulta la BD de soluciones
      sesion.categoria = cat;
      estado = ESTADOS.ESPERA_PROBLEMA; // Transición
      const problemas = DB_SOLUCIONES[cat].map(p => p.problema); // Consulta a DB_SOLUCIONES
      botResponde([`Categoría: ${cat.toUpperCase()}. ¿Cuál es tu problema específico?`], problemas);
      break;
    }

    // ── ESTADO: ESPERA_PROBLEMA ────────────────────────────────────────────
    // El bot muestra los problemas disponibles y espera que el usuario elija uno.
    // Tarea de sistema BPMN: "Busca solución" (consulta DB_SOLUCIONES)
    case ESTADOS.ESPERA_PROBLEMA: {
      const lista      = DB_SOLUCIONES[sesion.categoria];
      const encontrado = lista.find(p => p.problema === val);

      // Camino infeliz: el usuario escribió texto libre en lugar de elegir opción
      if (!encontrado) {
        botResponde(
          [{ texto: "⚠️ Por favor seleccioná uno de los problemas de la lista.", tipo: "error" }],
          lista.map(p => p.problema)
        );
        return;
      }

      // Camino feliz: problema encontrado, presenta la solución
      sesion.problema = encontrado.problema;
      sesion.solucion = encontrado.solucion;
      estado = ESTADOS.ESPERA_RESOLUCION; // Transición
      botResponde([
        { texto: `📋 <b>Solución sugerida:</b><br/>${encontrado.solucion}<br/><span class="db-badge">📁 Consultado en base de datos</span>`, tipo: "info", html: true },
        "¿Pudiste resolver el problema con esta solución?"
      ], ["✅ Sí, se resolvió", "❌ No, necesito más ayuda"]);
      break;
    }

    // ── ESTADO: ESPERA_RESOLUCION ──────────────────────────────────────────
    // Gateway BPMN: ¿Se resolvió?
    // Sí → FINALIZADO (ticket resuelto)
    // No → ESCALADO (ticket escalado a técnico N2)
    case ESTADOS.ESPERA_RESOLUCION: {
      if (val.includes("Sí") || val.includes("resolvió")) {
        // Camino feliz: problema resuelto → genera ticket y cierra proceso
        sesion.ticketId = generarTicketId();
        estado = ESTADOS.FINALIZADO;
        botResponde([
          { tipo: "ticket", data: {
            id:        sesion.ticketId,
            empleado:  sesion.empleado.nombre,
            area:      sesion.empleado.area,
            categoria: sesion.categoria.toUpperCase(),
            problema:  sesion.problema,
            estado:    "✅ Resuelto"
          }},
          { texto: "¡Perfecto! Me alegra que se haya resuelto. Que tengas un buen día 👋", tipo: "success" }
        ]);

      } else if (val.includes("No") || val.includes("ayuda")) {
        // Camino alternativo: no resuelto → escala a técnico N2
        sesion.ticketId = generarTicketId();
        estado = ESTADOS.ESCALADO;
        botResponde([
          { tipo: "ticket", data: {
            id:        sesion.ticketId,
            empleado:  sesion.empleado.nombre,
            area:      sesion.empleado.area,
            categoria: sesion.categoria.toUpperCase(),
            problema:  sesion.problema,
            estado:    "⚠️ Escalado a técnico N2"
          }},
          { texto: `🔧 Tu caso fue escalado a un técnico de Nivel 2. Ticket ${sesion.ticketId} registrado. Un técnico te contactará en menos de 2 horas hábiles.`, tipo: "error" }
        ]);

      } else {
        // Camino infeliz: entrada inválida en este estado
        botResponde(
          [{ texto: "⚠️ Por favor indicá si el problema se resolvió o no.", tipo: "error" }],
          ["✅ Sí, se resolvió", "❌ No, necesito más ayuda"]
        );
      }
      break;
    }

    // ── ESTADOS FINALES ────────────────────────────────────────────────────
    // El proceso ya terminó. No se aceptan más entradas.
    case ESTADOS.FINALIZADO:
    case ESTADOS.ESCALADO: {
      botResponde([{ texto: "Este ticket ya fue cerrado. Para una nueva consulta, recargá la página.", tipo: "info" }]);
      break;
    }
  }
  // ── Fin de la máquina de estados ────────────────────────────────────────
}

// ================================================================
// EVENTOS DE INTERFAZ
// ================================================================

// Botón "Enviar": procesa la entrada del campo de texto
document.getElementById("send-btn").onclick = () => {
  if (input.value.trim()) handleUserInput(input.value);
};

// Tecla Enter: misma acción que el botón enviar
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && input.value.trim()) handleUserInput(input.value);
});

// ================================================================
// INICIALIZACIÓN DEL BOT
// Se ejecuta automáticamente al cargar la página.
// Muestra el mensaje de bienvenida y transiciona al primer estado.
// ================================================================
function iniciarBot() {
  estado = ESTADOS.ESPERA_LEGAJO; // Estado inicial según el diagrama BPMN
  botResponde([
    "👋 ¡Bienvenido al sistema de Soporte Técnico de TechSoluciones S.A.!",
    "Soy TechBot y voy a ayudarte a resolver tu problema técnico.",
    "Para comenzar, ingresá tu número de legajo (4 dígitos):"
  ], [], 400);
}

iniciarBot(); // Arranque del bot
</script>
