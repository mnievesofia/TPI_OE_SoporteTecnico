<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Diagrama BPMN 2.0 – Soporte Técnico Nivel 1</title>
<desc>Proceso de soporte técnico interno con carriles Usuario y Sistema/Bot, dos gateways y flujos de error.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="680" height="920" fill="white"/>

<!-- Lane borders -->
<rect x="20" y="20" width="640" height="880" rx="8" fill="none" stroke="#444" stroke-width="1"/>
<rect x="20" y="20" width="36" height="880" rx="8" fill="#f0f0f0" stroke="#444" stroke-width="0.5"/>
<rect x="56" y="20" width="604" height="420" fill="#f7f9fc" stroke="#bbb" stroke-width="0.5"/>
<rect x="56" y="440" width="604" height="460" fill="#ffffff" stroke="#bbb" stroke-width="0.5"/>
<line x1="56" y1="440" x2="660" y2="440" stroke="#444" stroke-width="1"/>

<!-- Lane labels -->
<text font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle" transform="translate(38,230) rotate(-90)">USUARIO</text>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle" transform="translate(38,660) rotate(-90)">SISTEMA / BOT</text>

<!-- Pool title -->
<text font-family="Arial" font-size="13" font-weight="bold" fill="#1a1a1a" x="340" y="14" text-anchor="middle">Proceso de Soporte Técnico Nivel 1 – BPMN 2.0</text>

<!-- ===== USUARIO LANE ===== -->

<!-- START event -->
<circle cx="100" cy="120" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
<circle cx="100" cy="120" r="12" fill="#28a745" stroke="none" opacity="0.4"/>
<text font-family="Arial" font-size="11" fill="#333" text-anchor="middle" x="100" y="150">Inicio</text>

<!-- Task 1: Ingresa al bot -->
<rect x="148" y="96" width="150" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle" x="223" y="116">Ingresa al bot</text>
<text font-family="Arial" font-size="10" fill="#2563eb" text-anchor="middle" x="223" y="132">Nombre y legajo</text>

<!-- Task 2: Describe el problema -->
<rect x="340" y="96" width="150" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle" x="415" y="116">Describe el problema</text>
<text font-family="Arial" font-size="10" fill="#2563eb" text-anchor="middle" x="415" y="132">Selecciona categoría</text>

<!-- Gateway 1 -->
<rect x="530" y="96" width="100" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle" x="580" y="116">¿Tipo?</text>
<text font-family="Arial" font-size="10" fill="#b45309" text-anchor="middle" x="580" y="132">HW / SW / Red</text>

<!-- Task 3: Confirma si se resolvió -->
<rect x="340" y="300" width="150" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle" x="415" y="320">¿Se resolvió?</text>
<text font-family="Arial" font-size="10" fill="#2563eb" text-anchor="middle" x="415" y="336">Confirma al bot</text>

<!-- END event (resuelto) -->
<circle cx="580" cy="325" r="18" fill="#f8d7da" stroke="#dc3545" stroke-width="2.5"/>
<circle cx="580" cy="325" r="13" fill="#dc3545" opacity="0.3"/>
<text font-family="Arial" font-size="11" fill="#333" text-anchor="middle" x="580" y="355">Fin (resuelto)</text>

<!-- ===== SISTEMA/BOT LANE ===== -->

<!-- Task A: Valida legajo -->
<rect x="148" y="490" width="150" height="48" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle" x="223" y="510">Valida legajo</text>
<text font-family="Arial" font-size="10" fill="#047857" text-anchor="middle" x="223" y="526">Consulta DB empleados</text>

<!-- Task B: Busca solución -->
<rect x="340" y="490" width="150" height="48" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle" x="415" y="510">Busca solución</text>
<text font-family="Arial" font-size="10" fill="#047857" text-anchor="middle" x="415" y="526">Consulta base de datos</text>

<!-- Task C: Presenta solución -->
<rect x="340" y="600" width="150" height="48" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle" x="415" y="620">Presenta solución</text>
<text font-family="Arial" font-size="10" fill="#047857" text-anchor="middle" x="415" y="636">Pasos a seguir</text>

<!-- Gateway 2 -->
<rect x="530" y="490" width="100" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle" x="580" y="510">¿Resuelto?</text>
<text font-family="Arial" font-size="10" fill="#b45309" text-anchor="middle" x="580" y="526">Sí / No</text>

<!-- Task D: Escala -->
<rect x="530" y="600" width="100" height="48" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#991b1b" text-anchor="middle" x="580" y="620">Escala</text>
<text font-family="Arial" font-size="10" fill="#b91c1c" text-anchor="middle" x="580" y="636">A técnico N2</text>

<!-- Task E: Registra ticket -->
<rect x="340" y="710" width="150" height="48" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle" x="415" y="730">Registra ticket</text>
<text font-family="Arial" font-size="10" fill="#047857" text-anchor="middle" x="415" y="746">Guarda en base de datos</text>

<!-- Error box -->
<rect x="148" y="600" width="150" height="48" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
<text font-family="Arial" font-size="12" font-weight="bold" fill="#991b1b" text-anchor="middle" x="223" y="620">Entrada inválida</text>
<text font-family="Arial" font-size="10" fill="#b91c1c" text-anchor="middle" x="223" y="636">Mensaje de error</text>

<!-- END event (ticket cerrado) -->
<circle cx="415" cy="840" r="18" fill="#f8d7da" stroke="#dc3545" stroke-width="2.5"/>
<circle cx="415" cy="840" r="13" fill="#dc3545" opacity="0.3"/>
<text font-family="Arial" font-size="11" fill="#333" text-anchor="middle" x="415" y="868">Fin (ticket cerrado)</text>

<!-- ===== FLECHAS ===== -->

<!-- Inicio → Ingresa al bot -->
<line x1="118" y1="120" x2="146" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Ingresa al bot → Valida legajo (cross-lane) -->
<path d="M223 144 L223 488" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Valida legajo → Describe el problema (cross-lane) -->
<path d="M298 514 L330 514 L330 120 L338 120" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Describe el problema → Gateway 1 -->
<line x1="490" y1="120" x2="528" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Valida legajo → Error -->
<path d="M223 538 L223 598" fill="none" stroke="#dc3545" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#dc3545" x="228" y="572">No válido</text>

<!-- Error → Ingresa al bot (retry) -->
<path d="M148 624 L100 624 L100 120 L146 120" fill="none" stroke="#dc3545" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#dc3545" x="60" y="400" text-anchor="middle">Reintentar</text>

<!-- Gateway 1 → Busca solución (cross-lane) -->
<path d="M580 144 L580 460 L415 460 L415 488" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Busca solución → Presenta solución -->
<line x1="415" y1="538" x2="415" y2="598" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Busca solución → Gateway 2 -->
<line x1="490" y1="514" x2="528" y2="514" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Presenta solución → ¿Se resolvió? (cross-lane, up) -->
<path d="M490 624 L510 624 L510 310 L490 310" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- ¿Se resolvió? → Fin resuelto (Sí) -->
<line x1="490" y1="325" x2="560" y2="325" stroke="#28a745" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#28a745" x="525" y="315" text-anchor="middle">Sí</text>

<!-- ¿Se resolvió? → Gateway 2 (No) -->
<path d="M415 348 L415 380 L580 380 L580 488" fill="none" stroke="#dc3545" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#dc3545" x="460" y="372">No</text>

<!-- Gateway 2 → Escala (No) -->
<path d="M580 538 L580 598" fill="none" stroke="#dc3545" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#dc3545" x="592" y="572">No</text>

<!-- Gateway 2 → Registra ticket (Sí) -->
<path d="M530 514 L415 514 L415 538" fill="none" stroke="#28a745" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" fill="#28a745" x="470" y="508">Sí</text>

<!-- Registra ticket → Fin -->
<line x1="415" y1="758" x2="415" y2="820" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Escala → Registra ticket -->
<path d="M530 624 L500 624 L500 735 L490 735" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LEYENDA -->
<rect x="56" y="858" width="580" height="36" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="0.5"/>
<rect x="70" y="869" width="14" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text font-family="Arial" font-size="10" fill="#333" x="88" y="878">Tarea usuario</text>
<rect x="175" y="869" width="14" height="10" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text font-family="Arial" font-size="10" fill="#333" x="193" y="878">Tarea sistema/bot</text>
<rect x="310" y="869" width="14" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text font-family="Arial" font-size="10" fill="#333" x="328" y="878">Gateway (decisión)</text>
<rect x="450" y="869" width="14" height="10" rx="2" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
<text font-family="Arial" font-size="10" fill="#333" x="468" y="878">Error / Escalada</text>

</svg>
